services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: quality-dashboard:latest
    container_name: quality-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Persists the SQLite cache across restarts/rebuilds.
      - ./data:/app/data
    # Hard caps so this container can never starve the KB stack on the host.
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
